<head th:fragment="head(title, cssFile)">

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title th:text="${title}">Horse Racing Tournament</title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS chung -->
    <link rel="stylesheet"
          th:href="@{/assets/css/style.css}">

    <!-- CSS riêng của từng trang -->
    <link rel="stylesheet"
          th:if="${cssFile != null}"
          th:href="@{|/assets/css/${cssFile}|}">

</head>
