<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Admin Dashboard','admin.css')}"></head>

<body>

<div class="wrapper">

    <!-- Sidebar -->
    <aside th:replace="~{admin/fragments/sidebar :: sidebar}"></aside>

    <!-- Main -->
    <div class="main">

        <!-- Topbar -->
        <header th:replace="~{admin/fragments/topbar :: topbar}"></header>

        <!-- Content -->
        <main class="main-content">

            <!-- Welcome -->
            <div class="mb-4">
                <h2>Welcome back, Administrator 👋</h2>
                <p class="text-muted">
                    Horse Racing Tournament Management System
                </p>
            </div>
            <!-- Statistics -->
            <div class="row g-4">
                <!-- Users -->
                <div class="col-lg-3 col-md-6">
                    <div class="card stat-card">
                        <div class="card-body d-flex justify-content-between align-items-center">

                            <div>
                                <h6 class="text-muted">Users</h6>
                                <h2 th:text="${userCount}">0</h2>
                            </div>

                            <i class="fa-solid fa-users fa-3x text-primary"></i>

                        </div>
                    </div>
                </div>

                <!-- Horses -->
                <div class="col-lg-3 col-md-6">
                    <div class="card stat-card">
                        <div class="card-body d-flex justify-content-between align-items-center">

                            <div>
                                <h6 class="text-muted">Horses</h6>
                                <h2 th:text="${horseCount}">0</h2>
                            </div>

                            <i class="fa-solid fa-horse fa-3x text-success"></i>

                        </div>
                    </div>
                </div>

                <!-- Races -->
                <div class="col-lg-3 col-md-6">
                    <div class="card stat-card">
                        <div class="card-body d-flex justify-content-between align-items-center">

                            <div>
                                <h6 class="text-muted">Races</h6>
                                <h2 th:text="${raceCount}">0</h2>
                            </div>

                            <i class="fa-solid fa-flag-checkered fa-3x text-danger"></i>

                        </div>
                    </div>
                </div>

                <!-- Tournament -->
                <div class="col-lg-3 col-md-6">
                    <div class="card stat-card">
                        <div class="card-body d-flex justify-content-between align-items-center">

                            <div>
                                <h6 class="text-muted">Tournament</h6>
                                <h2 th:text="${tournamentCount}">0</h2>
                            </div>

                            <i class="fa-solid fa-trophy fa-3x text-warning"></i>

                        </div>
                    </div>
                </div>

            </div>

            <!-- Recent Activities -->
			<div class="row mt-5">
			    <div class="col-lg-8">
			        <div class="card h-100">
			            <div class="card-header">
			                Recent Races
			            </div>
			
			            <div class="card-body">
			                <table class="table table-hover">
			                    <thead>
			                    <tr>
			                        <th>Race</th>
			                        <th>Date</th>
			                        <th>Status</th>
			                    </tr>

			                    </thead>
			
			                    <tbody>		
			                    <tr>
			                        <td>Spring Cup</td>
			                        <td>26/06/2026</td>
			                        <td>
			                            <span class="badge bg-success">
			                                Finished
			                            </span>
			                        </td>
			                    </tr>			
			                    </tbody>
			                </table>	
			            </div>
			        </div>
			    </div>
			
			    <div class="col-lg-4">	
			        <div class="card h-100">
			            <div class="card-header">		
			                Recent Activities
			            </div>
			
			            <div class="card-body">		
			                <ul class="list-group list-group-flush">		
			                    <li class="list-group-item">
			                        New horse registered
			                    </li>
			
			                    <li class="list-group-item">
			                        New race created
			                    </li>
			
			                    <li class="list-group-item">
			                        Tournament updated
			                    </li>		
			                </ul>		
			            </div>			
			        </div>		
			    </div>	
			</div>
        </main>
    </div>
</div>

<div th:replace="~{fragments/scripts :: scripts}"></div>

</body>

</html>
