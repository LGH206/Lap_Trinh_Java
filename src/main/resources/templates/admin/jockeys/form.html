<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Jockey','admin.css')}"></head>

<body>

<div class="wrapper">

    <!-- Sidebar -->
    <aside th:replace="~{admin/fragments/sidebar :: sidebar}"></aside>

    <!-- Main -->
    <div class="main">

        <!-- Topbar -->
        <header th:replace="~{admin/fragments/topbar :: topbar}"></header>

        <!-- Content -->
        <main class="main-content">

            <!-- Page Header -->
            <div class="page-header">

                <div>

                    <h2 th:text="${jockey.userId == null ?
                            'Add Jockey'
                            : 'Edit Jockey'}">
                    </h2>

                    <p class="text-muted"
                       th:text="${jockey.userId == null ?
                       'Create a new jockey account.'
                       : 'Update jockey information.'}">
                    </p>

                </div>

            </div>

            <div class="card form-card">

                <div class="card-body">

                    <!-- Error -->
                    <div class="alert alert-danger"
                         th:if="${error}"
                         th:text="${error}">
                    </div>

                    <form th:action="@{/admin/jockeys/save}"
                          th:object="${jockey}"
                          method="post">

                        <input type="hidden"
                               th:field="*{userId}">

                        <div class="row g-3">

                            <!-- First Name -->
                            <div class="col-md-6">

                                <label class="form-label">
                                    First Name
                                </label>

                                <input
                                        type="text"
                                        class="form-control"
                                        th:field="*{firstName}"
                                        required>

                            </div>

                            <!-- Last Name -->
                            <div class="col-md-6">

                                <label class="form-label">
                                    Last Name
                                </label>

                                <input
                                        type="text"
                                        class="form-control"
                                        th:field="*{lastName}"
                                        required>

                            </div>

                            <!-- Username -->
                            <div class="col-md-6">

                                <label class="form-label">
                                    Username
                                </label>

                                <input
                                        type="text"
                                        class="form-control"
                                        th:field="*{userName}"
                                        required>

                            </div>

                            <!-- Email -->
                            <div class="col-md-6">

                                <label class="form-label">
                                    Email
                                </label>

                                <input
                                        type="email"
                                        class="form-control"
                                        th:field="*{email}"
                                        required>

                            </div>

                            <!-- Phone -->
                            <div class="col-md-6">

                                <label class="form-label">
                                    Phone Number
                                </label>

                                <input
                                        type="text"
                                        class="form-control"
                                        th:field="*{phoneNumber}">

                            </div>

                            <!-- License -->
                            <div class="col-md-6">

                                <label class="form-label">
                                    License Number
                                </label>

                                <input
                                        type="text"
                                        class="form-control"
                                        th:field="*{licenseNumber}"
                                        required>

                            </div>

                            <!-- Nationality -->
                            <div class="col-md-6">

                                <label class="form-label">
                                    Nationality
                                </label>

                                <input
                                        type="text"
                                        class="form-control"
                                        th:field="*{nationality}">

                            </div>

                            <!-- Date Of Birth -->
                            <div class="col-md-6">

                                <label class="form-label">
                                    Date Of Birth
                                </label>

                                <input
                                        type="date"
                                        class="form-control"
                                        th:field="*{dateOfBirth}">

                            </div>

                            <!-- Weight -->
                            <div class="col-md-6">

                                <label class="form-label">
                                    Weight (kg)
                                </label>

                                <input
                                        type="number"
                                        step="0.1"
                                        min="30"
                                        class="form-control"
                                        th:field="*{weight}">

                            </div>

                            <!-- Experience -->
                            <div class="col-md-6">

                                <label class="form-label">
                                    Experience Years
                                </label>

                                <input
                                        type="number"
                                        min="0"
                                        class="form-control"
                                        th:field="*{experienceYears}">

                            </div>

                            <!-- Password -->
                            <div class="col-md-6"
                                 th:if="${jockey.userId == null}">

                                <label class="form-label">
                                    Password
                                </label>

                                <input
                                        type="password"
                                        class="form-control"
                                        th:field="*{password}"
                                        required>

                            </div>

                            <!-- Confirm Password -->
                            <div class="col-md-6"
                                 th:if="${jockey.userId == null}">

                                <label class="form-label">
                                    Confirm Password
                                </label>

                                <input
                                        type="password"
                                        class="form-control"
                                        name="confirmPassword"
                                        required>

                            </div>

                        </div>

                        <hr>

                        <div class="form-footer">

                            <button
                                    type="submit"
                                    class="btn btn-primary">

                                <i class="fa-solid fa-floppy-disk"></i>

                                <span th:text="${jockey.userId == null ?
                                        'Save'
                                        : 'Update'}">
                                </span>

                            </button>
s
                            <a th:href="@{/admin/jockeys}"
                               class="btn btn-secondary">

                                <i class="fa-solid fa-arrow-left"></i>

                                Cancel

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </main>

    </div>

</div>

<div th:replace="~{fragments/scripts :: scripts}"></div>

</body>

</html>
