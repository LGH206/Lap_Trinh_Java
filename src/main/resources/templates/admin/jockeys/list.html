<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Jockey Management','admin.css')}"></head>

<body>

<div class="wrapper">

    <!-- Sidebar -->
    <aside th:replace="~{admin/fragments/sidebar :: sidebar}"></aside>

    <!-- Main -->
    <div class="main">

        <!-- Topbar -->
        <header th:replace="~{admin/fragments/topbar :: topbar}"></header>

        <!-- Content -->
        <main class="main-content">

            <div class="page-header d-flex justify-content-between align-items-center mb-4">

                <div>

                    <h2>Jockey Management</h2>

                    <p class="text-muted">
                        Manage all jockey accounts.
                    </p>

                </div>

                <a th:href="@{/admin/jockeys/add}"
                   class="btn btn-primary">

                    <i class="fa-solid fa-plus"></i>

                    Add Jockey

                </a>

            </div>

            <div class="card form-card">

                <div class="card-body">

                    <table class="table table-hover align-middle">

                        <thead>

                        <tr>

                            <th>ID</th>

                            <th>Username</th>

                            <th>License</th>

                            <th>Nationality</th>

                            <th>Experience</th>

                            <th>Status</th>

                            <th width="180">Action</th>

                        </tr>

                        </thead>

                        <tbody>

                        <tr th:each="jockey : ${jockeys}">

                            <td th:text="${jockey.userId}"></td>

                            <td th:text="${jockey.userName}"></td>

                            <td th:text="${jockey.licenseNumber}"></td>

                            <td th:text="${jockey.nationality}"></td>

                            <td>

                                <span th:text="${jockey.experienceYears}"></span>
                                years

                            </td>

                            <td>

                                <span class="badge bg-success"
                                      th:if="${jockey.active}">
                                    Active
                                </span>

                                <span class="badge bg-danger"
                                      th:unless="${jockey.active}">
                                    Locked
                                </span>

                            </td>

                            <td>

                                <!-- Edit -->

                                <a class="btn btn-warning btn-sm"
                                   th:href="@{/admin/jockeys/edit/{id}(id=${jockey.userId})}">

                                    <i class="fa-solid fa-pen"></i>

                                </a>

                                <!-- Lock -->

                                <a class="btn btn-danger btn-sm"
                                   th:if="${jockey.active}"
                                   th:href="@{/admin/jockeys/lock/{id}(id=${jockey.userId})}"
                                   onclick="return confirm('Lock this jockey?')">

                                    <i class="fa-solid fa-lock"></i>

                                </a>

                                <!-- Unlock -->

                                <a class="btn btn-success btn-sm"
                                   th:unless="${jockey.active}"
                                   th:href="@{/admin/jockeys/unlock/{id}(id=${jockey.userId})}"
                                   onclick="return confirm('Unlock this jockey?')">

                                    <i class="fa-solid fa-lock-open"></i>

                                </a>

                            </td>

                        </tr>

                        <tr th:if="${#lists.isEmpty(jockeys)}">

                            <td colspan="7"
                                class="text-center text-muted py-4">

                                No jockey found.

                            </td>

                        </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </main>

    </div>

</div>

<div th:replace="~{fragments/scripts :: scripts}"></div>

</body>

</html>
